name: Verify Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Type Check
      run: npm run lint
      
    - name: Build Test
      run: npm run build
      env:
        # Dummy vars for build checking
        DATABASE_URI: postgresql://dummy:dummy@localhost:5432/dummy?sslmode=disable
        PAYLOAD_SECRET: dummy-secret-for-build-only-must-be-at-least-32-chars
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
        NEON_AUTH_BASE_URL: https://dummy.auth.neon.tech
        NEON_AUTH_COOKIE_SECRET: dummy-cookie-secret-for-build-only
        CI: true
